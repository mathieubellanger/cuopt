name: Test images

on:
  workflow_call:
    inputs:
      ARCH:
        required: true
        type: string
      CUDA_VER:
        required: true
        type: string
      PYTHON_VER:
        required: true
        type: string
      IMAGE_TAG_PREFIX:
        required: true
        type: string
      sha:
        description: "sha: full git commit SHA to check out"
        required: true
        type: string

jobs:

  prepare:
    name: test-images (prepare)
    runs-on: ubuntu-latest
    outputs:
      CUDA_SHORT: ${{ steps.trim.outputs.CUDA_SHORT }}
      PYTHON_SHORT: ${{ steps.trim.outputs.PYTHON_SHORT }}
    steps:
      - name: Trim versions
        id: trim
        env:
          CUDA_VER: ${{ inputs.CUDA_VER }}
          PYTHON_VER: ${{ inputs.PYTHON_VER }}
        run: |
          CUDA_SHORT=$(echo "$CUDA_VER" | sed -E 's/([0-9]+\.[0-9]+)\.[0-9]+/\1/')
          PYTHON_SHORT=$(echo "$PYTHON_VER" | sed -E 's/([0-9]+\.[0-9]+)\.[0-9]+/\1/')

          echo "CUDA_SHORT=$CUDA_SHORT" >> $GITHUB_OUTPUT
          echo "PYTHON_SHORT=$PYTHON_SHORT" >> $GITHUB_OUTPUT

  test:
    name: test-images (${{ inputs.ARCH }}, ${{ inputs.IMAGE_TAG_PREFIX }}-cuda${{ needs.prepare.outputs.CUDA_SHORT }}-py${{ needs.prepare.outputs.PYTHON_SHORT }})
    runs-on: "linux-${{ inputs.ARCH }}-gpu-a100-latest-1"
    needs: prepare
    container:
      image: "nvidia/cuopt:${{ inputs.IMAGE_TAG_PREFIX }}-cuda${{ needs.prepare.outputs.CUDA_SHORT }}-py${{ needs.prepare.outputs.PYTHON_SHORT }}"
    steps:
      - name: Checkout code repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}
          persist-credentials: false
      - name: Test cuopt
        run: |
          bash ./ci/docker/test_image.sh

  test-ubi10:
    name: test-images-ubi10 (${{ inputs.ARCH }}, ${{ inputs.IMAGE_TAG_PREFIX }}-cuda${{ needs.prepare.outputs.CUDA_SHORT }}-ubi10)
    runs-on: "linux-${{ inputs.ARCH }}-gpu-a100-latest-1"
    needs: prepare
    container:
      image: "nvidia/cuopt:${{ inputs.IMAGE_TAG_PREFIX }}-cuda${{ needs.prepare.outputs.CUDA_SHORT }}-ubi10"
    steps:
      - name: Checkout code repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha }}
          persist-credentials: false
      - name: Test cuopt
        run: |
          bash ./ci/docker/test_image.sh
